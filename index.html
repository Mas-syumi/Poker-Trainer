<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PREFLOP 道場</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --felt: #1a3a2a;
  --felt-dark: #0f2218;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --card-bg: #fdf6e8;
  --text: #f0e8d5;
  --muted: #8aab96;
  --correct: #4caf78;
  --wrong: #e05555;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #0f2218; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #0f2218;
  color: #f0e8d5;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex; flex-direction: column; align-items: center;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.felt-texture {
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px),
    repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
  pointer-events: none; z-index: 0;
}
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px; min-height: 100vh;
  display: flex; flex-direction: column;
  padding: 0 12px 20px;
  background: #0f2218;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
}
.top-wrap {
  text-align: center; padding: 4px 0 0;
  border-bottom: 0.5px solid rgba(201,168,76,0.3); margin-bottom: 10px;
  background: #0f2218;
}
.logo { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold); letter-spacing: 2px; }
.subtitle { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; margin-bottom: 8px; }

.tab-bar {
  display: flex; margin: 0 0 0;
  border-top: 0.5px solid rgba(201,168,76,0.3); overflow: hidden;
}
.tab-btn {
  flex: 1; padding: 10px 4px;
  background: transparent; border: none; border-right: 0.5px solid rgba(201,168,76,0.3);
  color: var(--muted); font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.15s; touch-action: manipulation; -webkit-appearance: none;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); font-weight: 500; border-bottom: 2px solid var(--gold); }

.score-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 8px; }
.score-item {
  background: rgba(0,0,0,0.4); border: 0.5px solid rgba(201,168,76,0.3);
  border-radius: 10px; padding: 8px 8px; text-align: center;
}
.score-num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: #c9a84c; }
.score-num.green { color: #4caf78; }
.score-num.red { color: #e05555; }
.score-label { font-size: 11px; color: #8aab96; margin-top: 2px; letter-spacing: 1px; }

.table-area {
  background: var(--felt); border-radius: 40% / 20%;
  padding: 24px 20px; margin-bottom: 16px;
  border: 3px solid rgba(201,168,76,0.25);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 8px 32px rgba(0,0,0,0.5);
}
.position-info { text-align: center; margin-bottom: 18px; }
.position-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.position-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold-light); }
.position-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; letter-spacing: 1px; }
.players-after { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
.player-chip {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(201,168,76,0.4); background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace;
}
.player-chip.you { border-color: var(--gold); background: rgba(201,168,76,0.2); color: var(--gold); font-weight: 500; }

.cards-area { display: flex; justify-content: center; gap: 10px; margin-bottom: 4px; }
.card {
  width: 72px; height: 100px; border-radius: 8px; background: var(--card-bg);
  box-shadow: 0 6px 20px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,0,0,0.1);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: dealCard 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.card:nth-child(2) { animation-delay: 0.15s; }
@keyframes dealCard {
  from { opacity:0; transform:translateY(-30px) rotate(-5deg) scale(0.8); }
  to   { opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
}
.card-rank { font-family: 'Playfair Display', serif; font-size: 28px; line-height: 1; font-weight: 700; }
.card-suit { font-size: 22px; line-height: 1; margin-top: 2px; }
.card.red .card-rank, .card.red .card-suit { color: #c0392b; }
.card.black .card-rank, .card.black .card-suit { color: #1a1a2e; }
.hand-label { text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 2px; }
.hand-name { text-align: center; font-family: 'DM Mono', monospace; font-size: 16px; color: var(--gold-light); font-weight: 500; letter-spacing: 2px; margin-bottom: 6px; }
.tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 4px; letter-spacing: 1px; text-transform: uppercase; }
.tag-pair   { background: rgba(201,168,76,0.2); color: var(--gold); }
.tag-suited { background: rgba(120,76,175,0.2); color: #b39de0; }
.tag-off    { background: rgba(138,171,150,0.2); color: var(--muted); }

.action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.action-btn {
  padding: 12px 8px; border-radius: 12px; border: 1.5px solid;
  background: transparent; font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px; font-weight: 500; cursor: pointer; color: #f0e8d5; letter-spacing: 1px;
  touch-action: manipulation; -webkit-appearance: none;
  transition: transform 0.1s, background 0.15s;
}
.action-btn:active { transform: scale(0.94); }
.btn-reraise { border-color: #cc88cc; color: #cc88cc; }
.btn-reraise:active { background: rgba(200,100,200,0.2); }
.btn-4bet { border-color: #ff6688; color: #ff6688; }
.btn-4bet:active { background: rgba(255,100,136,0.2); }
.btn-call  { border-color: #3a7a5a; color: #6fcf97; }
.btn-call:active  { background: rgba(58,122,90,0.2); }
.btn-fold  { border-color: #6b3a3a; color: #e07777; }
.btn-fold:active  { background: rgba(107,58,58,0.2); }
.btn-reraise.selected { background: rgba(200,100,200,0.25); box-shadow: 0 0 0 2px #cc88cc; }
.btn-4bet.selected { background: rgba(255,100,136,0.2); box-shadow: 0 0 0 2px #ff6688; }
.btn-call.selected  { background: rgba(58,122,90,0.2);  box-shadow: 0 0 0 2px #3a7a5a; }
.btn-fold.selected  { background: rgba(107,58,58,0.2);  box-shadow: 0 0 0 2px #6b3a3a; }

.result-area {
  border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 14px;
  display: none; animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
.result-area.correct { background: #1a3a2a; border: 1px solid rgba(76,175,120,0.5); display: block; }
.result-area.wrong   { background: #2a1a1a; border: 1px solid rgba(224,85,85,0.5); display: block; }
.result-icon { font-size: 30px; margin-bottom: 6px; color: #f0e8d5; }
.result-text { font-size: 15px; color: #f0e8d5; line-height: 1.6; }
.result-action {
  display: inline-block; margin-top: 8px;
  font-family: 'DM Mono', monospace; font-size: 14px; padding: 4px 14px; border-radius: 6px; font-weight: 500;
}
.action-raise { background: rgba(201,168,76,0.2); color: var(--gold); }
.action-call  { background: rgba(58,122,90,0.2);  color: #6fcf97; }
.action-fold  { background: rgba(107,58,58,0.2);  color: #e07777; }
.range-hint { font-size: 11px; color: #8aab96; text-align: center; margin-top: 8px; }

.next-btn {
  width: 100%; padding: 18px; border-radius: 14px;
  border: 1.5px solid rgba(201,168,76,0.4); background: transparent; color: var(--gold);
  font-family: 'Playfair Display', serif; font-size: 18px; cursor: pointer; letter-spacing: 1px;
  touch-action: manipulation; -webkit-appearance: none; transition: background 0.2s; display: none;
  margin-bottom: 48px;
}
.next-btn:active { background: rgba(201,168,76,0.1); }
.mode-bar { display:flex; gap:8px; margin-bottom:8px; }
.mode-btn { flex:1; padding:8px; border-radius:8px; border:0.5px solid rgba(201,168,76,0.3); background:rgba(0,0,0,0.3); color:#8aab96; font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; touch-action:manipulation; transition:all 0.15s; }
.mode-btn.active { background:rgba(201,168,76,0.2); color:#c9a84c; font-weight:500; border-color:rgba(201,168,76,0.6); }
.btn-reraise { border-color:#cc88cc; color:#cc88cc; }
.btn-reraise:active { background:rgba(200,100,200,0.2); }
.btn-reraise.selected { background:rgba(200,100,200,0.2); box-shadow:0 0 0 2px #cc88cc; }
.next-btn.visible { display: block; animation: fadeIn 0.3s ease; }

/* STATS */
.stats-section { padding-bottom: 24px; background: #0f2218; position: relative; z-index: 1; }
.section-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-card {
  background: rgba(0,0,0,0.4); border: 0.5px solid rgba(201,168,76,0.3);
  border-radius: 12px; padding: 14px 12px; text-align: center;
}
.stat-card.full { grid-column: 1 / -1; }
.stat-big { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--gold); }
.stat-big.green { color: var(--correct); }
.stat-big.red   { color: var(--wrong); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
.pct-bar-wrap { background: rgba(0,0,0,0.4); border-radius: 6px; height: 8px; margin-top: 10px; overflow: hidden; }
.pct-bar { height: 100%; border-radius: 6px; background: var(--gold); transition: width 0.5s ease; }
.streak-row { display: flex; gap: 10px; margin-bottom: 20px; }
.streak-card {
  flex: 1; background: rgba(0,0,0,0.4); border: 0.5px solid rgba(201,168,76,0.3);
  border-radius: 12px; padding: 14px 12px; text-align: center;
}
.reset-btn {
  width: 100%; padding: 16px; border-radius: 12px;
  border: none; background: #cc4466; color: #ffffff;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer;
  touch-action: manipulation; -webkit-appearance: none; margin-top: 8px;
}
.reset-btn:active { background: #aa2244; }

/* RANGE TABLE */
.leg-item { display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.2); border-radius:6px; padding:4px 10px; white-space:nowrap; overflow:hidden; }
.leg-sq { width:18px; height:18px; border-radius:3px; flex-shrink:0; }
.leg-txt { font-size:11px; color:var(--text); display:flex; align-items:center; gap:4px; white-space:nowrap; }
.leg-num { font-family:'DM Mono',monospace; font-size:10px; background:rgba(255,255,255,0.15); border-radius:3px; padding:1px 4px; color:var(--gold); font-weight:500; }
.range-section { padding-bottom: 24px; background: #0f2218; position: relative; z-index: 1; }
.legend-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.leg-sq { width: 12px; height: 12px; border-radius: 2px; }
.range-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.range-table { border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 8.5px; width: 100%; }
.range-table th {
  background: rgba(0,0,0,0.4); color: var(--gold); padding: 4px 2px; text-align: center;
  font-weight: 500; border: 0.5px solid rgba(255,255,255,0.06); width: calc(100%/14);
}
.range-table td {
  padding: 3px 1px; text-align: center; border: 0.5px solid rgba(255,255,255,0.06);
  font-size: 7.5px; color: rgba(255,255,255,0.85);
}
.rt-purple { background: #cc66cc; color: #1a001a; }
.rt-red    { background: #ee1111; color: #ffffff; }
.rt-yellow { background: #ddcc00; color: #110800; }
.rt-tyellow { background: #aacc00; color: #112200; }
.rt-lgreen { background: #44bb44; color: #001a00; }
.rt-lblue  { background: #55aacc; color: #001122; }
.rt-white  { background: #dddddd; color: #111111; }
.rt-tpink  { background: #ffaacc; color: #660033; }
.rt-redbox { background: #cccccc; color: #880000; }
.rt-fold   { background: #22223a; color: rgba(255,255,255,0.25) !important; }
</style>
</head>
<body>
<div class="felt-texture"></div>
<div class="container">
  <div class="top-wrap">
    <div class="logo">プリフロップ道場</div>
    <div class="subtitle">ヨコサワのハンドレンジ表をマスター！</div>
    <div class="mode-bar" style="margin:6px 0 0;">
      <button class="mode-btn active" id="mode-ring" onclick="setMode('ring',this)">リング</button>
      <button class="mode-btn" id="mode-tourn" onclick="setMode('tourn',this)">トーナメント</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('game',this)">ゲーム</button>
      <button class="tab-btn" onclick="showTab('stats',this)">成績</button>
      <button class="tab-btn" onclick="showTab('range',this)">レンジ表</button>
    </div>
  </div>

  <!-- GAME TAB -->
  <div id="tab-game">
    <div class="score-bar">
      <div class="score-item"><div class="score-num" id="s-round">1</div><div class="score-label">ラウンド</div></div>
      <div class="score-item"><div class="score-num green" id="s-correct">0</div><div class="score-label">正解</div></div>
      <div class="score-item"><div class="score-num" id="s-wrong" style="color:#c9a84c">0</div><div class="score-label">ミス</div></div>
    </div>
    <div style="text-align:center;margin-bottom:6px;">
      <span class="position-name" id="pos-after">5人</span>
      <span class="position-sub" id="pos-name" style="margin-left:8px;">ポジション：UTG</span>
    </div>
    <div class="table-area">
      <svg id="table-svg" viewBox="0 0 320 130" width="100%" style="display:block;"></svg>
    </div>
    <div class="cards-area" id="cards-area"></div>
    <div class="hand-label" id="hand-label"></div>
    <div class="hand-name" id="hand-name"></div>
    <div class="action-area" id="action-area" style="grid-template-columns:1fr 1fr;">
      <button id="btn-fold"    class="action-btn btn-fold"    onclick="choose('fold')">フォールド</button>
      <button id="btn-call"    class="action-btn btn-call"    onclick="choose('call')">コール</button>
      <button id="btn-3bet"    class="action-btn btn-reraise" onclick="choose('3bet')">3ベット</button>
      <button id="btn-4bet"    class="action-btn btn-4bet"    onclick="choose('4bet')">4ベット</button>
    </div>
    <div class="result-area" id="result-area">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-text" id="result-text"></div>
      <div><span class="result-action" id="result-action"></span></div>
      <div class="range-hint" id="range-hint"></div>
      <div class="range-hint" id="strength-hint" style="color:var(--gold-light);font-size:12px;margin-top:4px;"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextHand()">次のハンド →</button>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" style="display:none" class="stats-section">
    <div class="section-title" id="stats-mode-label">累計成績（リング）</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-big" id="st-total">0</div><div class="stat-lbl">総問数</div></div>
      <div class="stat-card"><div class="stat-big green" id="st-correct">0</div><div class="stat-lbl">正解</div></div>
      <div class="stat-card"><div class="stat-big" id="st-wrong" style="color:var(--gold)">0</div><div class="stat-lbl">ミス</div></div>
      <div class="stat-card"><div class="stat-big" id="st-pct">—</div><div class="stat-lbl">正解率</div></div>
      <div class="stat-card full">
        <div class="stat-lbl" style="margin-bottom:6px">正解率バー</div>
        <div class="pct-bar-wrap"><div class="pct-bar" id="pct-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="section-title">今日の成績</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-big" id="td-total">0</div><div class="stat-lbl">総問数</div></div>
      <div class="stat-card"><div class="stat-big green" id="td-correct">0</div><div class="stat-lbl">正解</div></div>
    </div>
    <div class="section-title">連続正解</div>
    <div class="streak-row">
      <div class="streak-card"><div class="stat-big" id="st-streak">0</div><div class="stat-lbl">現在</div></div>
      <div class="streak-card"><div class="stat-big" id="st-best">0</div><div class="stat-lbl">最長記録</div></div>
    </div>
    <button class="reset-btn" onclick="resetStats()">成績をリセット</button>
  </div>

  <!-- RANGE TAB -->
  <div id="tab-range" style="display:none" class="range-section">
    <div id="range-mode-label" style="text-align:center;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;">リングゲーム用</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;">
      <div id="legend-grid" style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;"></div>
    </div>
    <div class="range-table-wrap">
      <table class="range-table" id="range-tbl"></table>
    </div>
  </div>
</div>

<script>
const SUITS=[{sym:'♠',color:'black',name:'s'},{sym:'♥',color:'red',name:'h'},{sym:'♦',color:'red',name:'d'},{sym:'♣',color:'black',name:'c'}];
const RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const RANK_DISPLAY={T:'10'};
// テーブル人数ごとのポジション定義 (時計回り: 行動順に並べる)
const TABLE_CONFIGS={
  3: ['BTN','SB','BB'],
  4: ['CO','BTN','SB','BB'],
  5: ['HJ','CO','BTN','SB','BB'],
  6: ['UTG','HJ','CO','BTN','SB','BB'],
  7: ['UTG','UTG+1','HJ','CO','BTN','SB','BB'],
  8: ['UTG','UTG+1','LJ','HJ','CO','BTN','SB','BB'],
  9: ['UTG','UTG+1','UTG+2','LJ','HJ','CO','BTN','SB','BB'],
};
// after = 自分より後に行動する人数（全員カウント）
function getAfter(seats, myPos){
  const idx=seats.indexOf(myPos);
  return seats.length - 1 - idx;
}
// ポジションの行動順（早い順）
const ACT_ORDER=['UTG','UTG+1','UTG+2','LJ','HJ','CO','BTN','SB','BB'];

// ランダムにテーブル人数とポジションを選ぶ
function randomPos(){
  const n=3+Math.floor(Math.random()*7); // 3〜9
  const seats=TABLE_CONFIGS[n];
  const rnd=Math.random();

  // 25%の確率でvsレイズ場面（BBシナリオ含む拡張版）
  if(rnd<0.25 && n>=4){
    // レイザー候補：自分より前のポジション
    // 「レイザー」と「自分」のペアをランダムに選ぶ
    const nonBlinds=seats.filter(s=>s!=='SB'&&s!=='BB');
    // レイザーは最低2人いる卓で実施
    if(nonBlinds.length>=2){
      // raisers: BTN以外の非ブラインド（BTNはコール者の前提で使いにくいので含める）
      const raiserIdx=Math.floor(Math.random()*(nonBlinds.length-1)); // 最後のBTN以外
      const raiser=nonBlinds[raiserIdx];
      // 自分: レイザーより後のポジション（BB含む）
      const raiserSeatIdx=seats.indexOf(raiser);
      const afterRaiser=seats.slice(raiserSeatIdx+1); // レイザーより後ろ
      const callerCandidates=afterRaiser.filter(s=>s!=='SB'); // SBは除外（複雑なので）
      if(callerCandidates.length===0) return randomPosNormal(n,seats);
      const myPos=callerCandidates[Math.floor(Math.random()*callerCandidates.length)];
      const after=getAfter(seats,myPos);
      return {name:myPos,after:after,tableSize:n,seats:seats,raiser:raiser,scenario:'vsraise'};
    }
  }

  return randomPosNormal(n,seats);
}

function randomPosNormal(n,seats){
  // 通常: SB/BBは除外
  const candidates=seats.filter(s=>s!=='BB'&&s!=='SB');
  const name=candidates[Math.floor(Math.random()*candidates.length)];
  const after=getAfter(seats,name);
  return {name:name,after:after,tableSize:n,seats:seats,raiser:null,scenario:'open'};
}

// レイザーポジションの「レイズ基準ランク」を返す（実際の卓のseatsを使う）
function getRaiserThreshold(raiser, mode, seats){
  const s=seats||['UTG','UTG+1','UTG+2','LJ','HJ','CO','BTN','SB','BB'];
  const raiserAfter=getAfter(s,raiser);
  const thMap=mode==='tourn'?posThresholdT:posThreshold;
  return thMap[Math.min(raiserAfter,8)]||1;
}

function getCorrectAction(handColor, afterCount, raiser, myPos, seats){
  const handRank = colorRank[handColor]||9;

  if(raiser){
    const raiserThreshold = getRaiserThreshold(raiser, gameMode, seats);
    const diff = raiserThreshold - handRank; // 正=自分が強い
    if(diff >= 2) return myPos==='BB' ? '4bet' : '3bet';
    if(diff >= 1) return 'call';
    // BBかつBTNレイズの特例：赤枠（リング）／桃（トーナメント）までコールOK
    if(myPos==='BB' && raiser==='BTN'){
      const bbCallColor = gameMode==='tourn' ? 'tpink' : 'redbox';
      const bbCallRank = colorRank[bbCallColor];
      if(handRank <= bbCallRank) return 'call';
    }
    return 'fold';
  }

  // オープン：自分のポジション色以上→3ベット（オープンレイズ）、未満→フォールド
  const thMap = gameMode==='tourn' ? posThresholdT : posThreshold;
  const threshold = thMap[Math.min(afterCount,8)]||1;
  return handRank <= threshold ? '3bet' : 'fold';
}

}
function getHandKey(c1,c2){
  const ri1=RANKS.indexOf(c1.rank),ri2=RANKS.indexOf(c2.rank);
  let r1=c1.rank,r2=c2.rank;
  if(ri1>ri2){r1=c2.rank;r2=c1.rank;}
  if(r1===r2)return r1+r2;
  return r1+r2+(c1.suit.name===c2.suit.name?'s':'o');
}
function getHandType(key){return key.length===2?'pair':key.endsWith('s')?'suited':'offsuit';}

  document.getElementById('s-wrong').style.color=sessionWrong>0?'var(--wrong)':'#c9a84c';
  const ra=document.getElementById('result-area');
  ra.className='result-area '+(isCorrect?'correct':'wrong');
  document.getElementById('result-icon').textContent=isCorrect?'◎':'✗';
  const msgs=actionMessages[currentAnswer];
  document.getElementById('result-text').textContent=isCorrect?'正解！'+msgs[Math.floor(Math.random()*msgs.length)]:'ミス。正解は…';
  const ra2=document.getElementById('result-action');
  ra2.className='result-action '+actionClass[currentAnswer];
  ra2.textContent=actionLabel[currentAnswer];
  const handType=getHandType(currentHand);
  let hintMsg='';
  const pairRaise=['ポケットペア！積極的に攻めよう','セットを狙え！','ペアの強さを活かせ'];
  const pairFold=['小さいペアはポジション次第','UTGでの小ペアは我慢','スタックが深ければ…ここは辛抱'];
  const suitedRaise=['スーテッドの強ハンド、レイズ！','同スートの強みを活かせ','フラッシュドローも狙える'];
  const suitedFold=['スーテッドでもポジション次第','スーテッドは広めだが限界あり','ポジションが正義！ここは我慢'];
  const offsuitRaise=['オフスーツだが十分強いハンド','参加するならレイズ','強いハンドでイニシアチブを'];
  const offsuitFold=['オフスーツは厳しめに絞るのが基本','ムダな出血を防ごう','次のハンドに集中'];
  const bbMsg=['BBの特権を活かせ！','コスト1bb安い優位性がある','BBのポジションを理解しよう'];
  const r=Math.floor;
  // アドバイスメッセージ
  const hintMsgs={
    '3bet': {
      pair:['ポケットペア！オープンレイズ','セットを狙え！','ペアでイニシアチブを'],
      suited:['スーテッドで3ベット！','同スートの強みを活かせ','フラッシュドローも狙える'],
      offsuit:['強いオフスーツ、レイズ！','参加するなら3ベット','イニシアチブを取れ'],
      vsraise:['レイザーより2ランク以上上！','3ベットでプレッシャーを','相手のレンジに勝っている'],
    },
    'call':{
      any:['コール圏内、フロップへ','フラットコールで様子を見よう','ポジションを活かしてコール'],
    },
    'fold':{
      pair:['小さいペアはポジション次第','UTGでの小ペアは辛抱','次のハンドに集中'],
      suited:['スーテッドでもポジション次第','ポジションが正義！ここは我慢','次のハンドに集中'],
      offsuit:['オフスーツは厳しめに絞るのが基本','ムダな出血を防ごう','次のハンドに集中'],
      vsraise:['相手のレンジに負けている','ここは我慢してフォールド','コール範囲外、潔く降りよう'],
    },
    '4bet':{
      any:['BBから4ベット！最強ハンド','BBの特権で4ベットサイズ','BBなので4倍サイズで3ベット'],
    },
  };
  let hint='';
  const isVsRaise=!!(currentPos&&currentPos.raiser);
  if(currentAnswer==='4bet'){
    const m=hintMsgs['4bet'].any; hint=m[r(Math.random()*m.length)];
  } else if(currentAnswer==='call'){
    const m=hintMsgs['call'].any; hint=m[r(Math.random()*m.length)];
  } else if(currentAnswer==='3bet'){
    const key=isVsRaise?'vsraise':handType;
    const m=hintMsgs['3bet'][key]||hintMsgs['3bet'].offsuit; hint=m[r(Math.random()*m.length)];
  } else {
    const key=isVsRaise?'vsraise':handType;
    const m=hintMsgs['fold'][key]||hintMsgs['fold'].offsuit; hint=m[r(Math.random()*m.length)];
  }
  document.getElementById('range-hint').textContent=hint;

  const colorLabel={purple:'紫',red:'赤',yellow:'黄',tyellow:'黄(弱)',lgreen:'緑',lblue:'水色',white:'白',tpink:'桃',redbox:'ピンク枠',fold:'フォールド'};
  const hColor=(gameMode==='tourn'?tournRangeColor:rangeColor)[currentHand]||'fold';
  const thMap2=gameMode==='tourn'?posThresholdT:posThreshold;
  const thr2=thMap2[Math.min(currentPos.after,8)]||1;
  const maxRank=gameMode==='tourn'?9:8;
  const hRankAdj=gameMode==='tourn'?colorRank[hColor]||9:(colorRank[hColor]<=8?colorRank[hColor]:8);
  const probMap=gameMode==='tourn'?tournProb:ringProb;
  const prob=probMap[hColor]||0;
  if(isVsRaise){
    const raiserThr=getRaiserThreshold(currentPos.raiser, gameMode, currentPos.seats);
    let hintTxt=colorLabel[hColor]+' '+hRankAdj+'/'+maxRank+'番目（'+prob+'%）'
      +' / '+currentPos.raiser+'基準: '+raiserThr+'番　コール: '+(raiserThr-1)+'番　4ベット: '+(raiserThr-2)+'番以上';
    if(currentPos.name==='BB' && currentPos.raiser==='BTN'){
      const bbCallColor=gameMode==='tourn'?'tpink':'redbox';
      const bbCallLabel=gameMode==='tourn'?'桃':'赤枠';
      hintTxt+='　BB特例: '+bbCallLabel+'までコールOK';
    }
    document.getElementById('strength-hint').textContent=hintTxt;
  } else {
    document.getElementById('strength-hint').textContent=colorLabel[hColor]+' '+hRankAdj+'/'+maxRank+'番目（'+prob+'%）/ 基準: '+thr2+'番';
  }

  sessionRound++;
  document.getElementById('next-btn').className='next-btn visible';
}

function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['game','stats','range'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='stats'){stats=loadStats();renderStats();}
  if(tab==='range'){
    document.getElementById('range-mode-label').textContent=gameMode==='tourn'?'トーナメント用':'リングゲーム用';
    buildRangeLegend();
    rangeTblBuilt=false;
    buildRangeTable();
  }
}

function renderStats(){
  const modeLabel=gameMode==='tourn'?'トーナメント':'リング';
  document.getElementById('stats-mode-label').textContent='累計成績（'+modeLabel+'）';
  checkToday();
  const t=stats.total,c=stats.correct;
  const pct=t>0?Math.round(c/t*100):0;
  document.getElementById('st-total').textContent=t;
  document.getElementById('st-correct').textContent=c;
  document.getElementById('st-wrong').textContent=stats.wrong;
  document.getElementById('st-wrong').style.color=stats.wrong>0?'var(--wrong)':'var(--gold)';
  document.getElementById('st-pct').textContent=t>0?pct+'%':'—';
  document.getElementById('pct-bar').style.width=pct+'%';
  document.getElementById('td-total').textContent=stats.todayTotal;
  document.getElementById('td-correct').textContent=stats.todayCorrect;
  document.getElementById('st-streak').textContent=stats.streak;
  document.getElementById('st-best').textContent=stats.best;
}

function resetStats(){
  stats={total:0,correct:0,wrong:0,streak:0,best:0,todayDate:'',todayTotal:0,todayCorrect:0};
  saveStats();renderStats();
  sessionCorrect=0;sessionWrong=0;sessionRound=1;
  document.getElementById('s-correct').textContent='0';
  document.getElementById('s-wrong').textContent='0';
  document.getElementById('s-round').textContent='1';
}

let rangeTblBuilt=false;
function buildRangeLegend(){
  const ring=[
    {cls:'rt-purple', num:1, label:'8人・強',   prob:2.56},
    {cls:'rt-red',    num:2, label:'8人・中',   prob:3.47},
    {cls:'rt-yellow', num:3, label:'6〜7人',    prob:3.62},
    {cls:'rt-lgreen', num:4, label:'4〜5人',    prob:6.34},
    {cls:'rt-lblue',  num:5, label:'3人',       prob:6.18},
    {cls:'rt-white',  num:6, label:'0〜2人',    prob:11.17},
    {cls:'rt-redbox', num:7, label:'BBのみBTNにコールOK',prob:5.13, outline:true},
    {cls:'rt-fold',   num:8, label:'フォールド', prob:61.55},
  ];
  const tourn=[
    {cls:'rt-purple',  num:1, label:'8人・強',   prob:2.56},
    {cls:'rt-red',     num:2, label:'8人・中',   prob:3.47},
    {cls:'rt-tyellow', num:3, label:'8人・弱',   prob:3.62},
    {cls:'rt-lgreen',  num:4, label:'6〜7人',    prob:6.34},
    {cls:'rt-lblue',   num:5, label:'4〜5人',    prob:6.18},
    {cls:'rt-white',   num:6, label:'3人',       prob:11.17},
    {cls:'rt-redbox',  num:7, label:'0〜2人',           prob:5.13,  outline:true},
    {cls:'rt-tpink',   num:8, label:'BBのみBTNにコールOK', prob:14.48},
    {cls:'rt-fold',    num:9, label:'フォールド', prob:47.07},
  ];
  const items=gameMode==='tourn'?tourn:ring;
  const grid=document.getElementById('legend-grid');
  grid.innerHTML=items.map(item=>{
    const sq=`<div class="leg-sq ${item.cls}"${item.outline?' style="outline:2px solid #cc2222;outline-offset:-2px;"':''}></div>`;
    return `<div class="leg-item">${sq}<div class="leg-txt"><span class="leg-num">${item.num}</span>${item.label}<span style="margin-left:4px;font-size:9px;opacity:0.6">${item.prob}%</span></div></div>`;
  }).join('');
}

function buildRangeTable(){
  if(rangeTblBuilt)return;
  rangeTblBuilt=true;
  const tbl=document.getElementById('range-tbl');
  const R=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  const clsMap={purple:'rt-purple',red:'rt-red',yellow:'rt-yellow',tyellow:'rt-tyellow',lgreen:'rt-lgreen',lblue:'rt-lblue',white:'rt-white',tpink:'rt-tpink',redbox:'rt-redbox',fold:'rt-fold'};
  let html='<tr><th></th>';
  R.forEach(r=>html+=`<th>${r}</th>`);
  html+='</tr>';
  R.forEach((r1,i)=>{
    html+=`<tr><th>${r1}</th>`;
    R.forEach((r2,j)=>{
      let key,label;
      if(i===j){key=r1+r1;label=r1+r1;}
      else if(j>i){key=r1+r2+'s';label=r1+r2+'s';}
      else{key=r2+r1+'o';label=r2+r1+'o';}
      const color=(gameMode==='tourn'?tournRangeColor:rangeColor)[key]||'fold';
      const cls=clsMap[color]||'rt-fold';
      const lightColors=['lgreen','lblue','white','redbox','yellow','tyellow','tpink'];
      const darkText=lightColors.includes(color);
      let cellStyle=darkText?'color:#111111;':'';
      if(color==='redbox') cellStyle='color:#880000;outline:2px solid #cc2222;outline-offset:-2px;';
      html+=`<td class="${cls}" style="${cellStyle}">${label}</td>`;
    });
    html+='</tr>';
  });
  tbl.innerHTML=html;
}

buildRangeLegend();
nextHand();
</script>
